name: Rescate de Todos los Secretos (Borrar después)

on: workflow_dispatch 

jobs:
  rescate:
    runs-on: ubuntu-latest
    steps:
      - name: Extraer y codificar en Base64
        run: |
          echo "Atención: Decodifica estos valores en tu terminal local."
          
          echo "CLOUDFLARE_ACCOUNT_ID: $(echo -n '${{ secrets.CLOUDFLARE_ACCOUNT_ID }}' | base64)"
          echo "CLOUDFLARE_API_TOKEN: $(echo -n '${{ secrets.CLOUDFLARE_API_TOKEN }}' | base64)"
          
          echo "GEMINI_API_KEY: $(echo -n '${{ secrets.GEMINI_API_KEY }}' | base64)"
          
          echo "GROQ_API_KEY: $(echo -n '${{ secrets.GROQ_API_KEY }}' | base64)"
          echo "GROQ_API_KEY_2: $(echo -n '${{ secrets.GROQ_API_KEY_2 }}' | base64)"
          
          echo "OPENAI_API_KEY: $(echo -n '${{ secrets.OPENAI_API_KEY }}' | base64)"
          echo "RESEND_API_KEY: $(echo -n '${{ secrets.RESEND_API_KEY }}' | base64)"
          
          echo "SUPABASE_SERVICE_KEY: $(echo -n '${{ secrets.SUPABASE_SERVICE_KEY }}' | base64)"
          echo "SUPABASE_URL: $(echo -n '${{ secrets.SUPABASE_URL }}' | base64)"
          
          echo "TELEGRAM_ADMIN_CHAT_ID: $(echo -n '${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}' | base64)"
          echo "TELEGRAM_BOT_TOKEN: $(echo -n '${{ secrets.TELEGRAM_BOT_TOKEN }}' | base64)"
          echo "TELEGRAM_CHANNEL_ID: $(echo -n '${{ secrets.TELEGRAM_CHANNEL_ID }}' | base64)"
          
          echo "VERCEL_WEBHOOK: $(echo -n '${{ secrets.VERCEL_WEBHOOK }}' | base64)"
