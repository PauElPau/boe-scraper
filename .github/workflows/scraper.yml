name: BOE Scraper Diario

# 1. Cuándo se ejecuta
on:
  #schedule:
    # 06:15 AM UTC -> (07:15 España Invierno / 08:15 España Verano) de Lunes a Sábado
    #- cron: "15 5 * * 1-6"
  workflow_dispatch:

# 💡 PRO-TIP 1: Evita que se ejecuten dos scrapers al mismo tiempo
concurrency:
  group: scraper-produccion
  cancel-in-progress: false

jobs:
  extraer-datos:
    runs-on: ubuntu-latest
    # 💡 PRO-TIP 2: Freno de emergencia (Mata el proceso si tarda más de 120 mins)
    timeout-minutes: 180

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm' # 💡 PRO-TIP 3: Activa la caché para volar en la instalación

      # ⚠️ RECUERDA: Para que 'npm ci' funcione, el archivo 'package-lock.json' DEBE estar subido a tu GitHub
      - name: Instalar paquetes
        run: npm ci

      - name: Ejecutar Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VERCEL_WEBHOOK: ${{ secrets.VERCEL_WEBHOOK }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          #GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: node index.js