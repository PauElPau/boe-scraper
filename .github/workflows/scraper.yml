name: Scraper boletines Diario

# 1. Cuándo se ejecuta
on:
  schedule:
    # 06:05 AM UTC (08:05 España Verano / 07:05 España Invierno) TODOS LOS DÍAS
    - cron: "5 6 * * *"
  workflow_dispatch:

# 💡 PRO-TIP 1: Evita que se ejecuten dos scrapers al mismo tiempo
concurrency:
  group: scraper-produccion
  cancel-in-progress: false

jobs:
  extraer-datos:
    runs-on: ubuntu-latest
    # 💡 PRO-TIP 2: Freno de emergencia (Mata el proceso si tarda más de 240 mins)
    timeout-minutes: 240

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm' # 💡 PRO-TIP 3: Activa la caché para volar en la instalación

      # ⚠️ RECUERDA: Para que 'npm ci' funcione, el archivo 'package-lock.json' DEBE estar subido a tu GitHub
      - name: Instalar paquetes
        run: npm ci

      - name: Ejecutar Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VERCEL_WEBHOOK: ${{ secrets.VERCEL_WEBHOOK }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node --no-warnings index.js