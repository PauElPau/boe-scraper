name: 🚀 Ejecutar Backfill de Categorías

# Este disparador crea un botón manual en la pestaña "Actions" de GitHub
on:
  workflow_dispatch: 

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga tu código
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      # 2. Prepara Node.js
      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Versión estable y rápida

      # 3. Instala las librerías (Supabase, OpenAI, etc.)
      - name: 📦 Instalar dependencias
        run: npm install

      # 4. Ejecuta tu script inyectando los secretos
      - name: 🧠 Ejecutar IA Backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node backfill_categorias.js