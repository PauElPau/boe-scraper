name: 🚀 Ejecutar Backfill SEO (Artículos)

# Este disparador crea un botón manual en la pestaña "Actions" de GitHub
on:
  workflow_dispatch: 

jobs:
  backfill-seo:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga tu código
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      # 2. Prepara Node.js (Versión 18+ es recomendada para fetch nativo)
      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Instala las librerías necesarias (Supabase, OpenAI)
      - name: 📦 Instalar dependencias
        run: npm install

      # 4. Ejecuta el script inyectando los secretos de tu repositorio
      - name: ✍️ Ejecutar IA Redactor SEO
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node backfill_seo.js